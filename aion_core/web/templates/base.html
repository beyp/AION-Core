<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{% block title %}AION-Core{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
:root[data-theme="dark"] {
  --bg:#0f1117; --sidebar:#13161f; --card:#1a1d27; --border:#2a2d3e;
  --text:#e0e0e0; --dim:#888; --accent:#1e90ff; --accent2:#7B2FBE;
  --green:#4caf50; --orange:#ff9800; --red:#f44336; --hdr:#151821;
}
:root[data-theme="light"] {
  --bg:#f0f2f5; --sidebar:#fff; --card:#fff; --border:#dde1f0;
  --text:#1a1a2e; --dim:#666; --accent:#1e90ff; --accent2:#7B2FBE;
  --green:#2e7d32; --orange:#e65100; --red:#c62828; --hdr:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{background:var(--hdr);border-bottom:2px solid var(--accent);
  padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
header h1{color:var(--accent);font-size:1.2rem;font-weight:700;}
header .ver{color:var(--dim);font-size:0.78rem;}
header .spacer{flex:1;}
.hbtn{background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:5px 12px;border-radius:6px;cursor:pointer;font-size:0.82rem;
  text-decoration:none;transition:background 0.2s;}
.hbtn:hover{background:var(--accent);color:white;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:10px 0;}
.sb-section{padding:4px 12px;font-size:0.68rem;text-transform:uppercase;
  letter-spacing:1px;color:var(--dim);margin-top:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;
  cursor:pointer;border-left:3px solid transparent;font-size:0.88rem;
  text-decoration:none;color:var(--text);transition:background 0.15s;}
.nav-item:hover{background:color-mix(in srgb,var(--accent) 8%,transparent);}
.nav-item.active{background:color-mix(in srgb,var(--accent) 12%,transparent);
  border-left-color:var(--accent);color:var(--accent);font-weight:600;}
.nav-icon{width:20px;text-align:center;font-size:1rem;}
.nav-label{flex:1;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);
  margin-left:auto;display:inline-block;flex-shrink:0;}
.main{flex:1;overflow-y:auto;padding:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:18px;margin-bottom:16px;}
.card-title{color:var(--accent);font-size:0.88rem;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.75rem;font-weight:600;}
.badge-green{background:color-mix(in srgb,var(--green) 20%,transparent);color:var(--green);}
.badge-blue{background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent);}
.badge-orange{background:color-mix(in srgb,var(--orange) 20%,transparent);color:var(--orange);}
.badge-red{background:color-mix(in srgb,var(--red) 20%,transparent);color:var(--red);}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 200px);}
.chat-hist{flex:1;overflow-y:auto;background:#0a0c14;border-radius:8px;
  padding:14px;font-family:"Cascadia Code",Consolas,monospace;font-size:0.83rem;
  margin-bottom:12px;min-height:200px;}
.chat-user{color:var(--accent);margin-top:10px;}
.chat-ai{color:var(--green);margin-top:4px;white-space:pre-wrap;}
.chat-error{color:var(--red);margin-top:4px;}
.chat-input-row{display:flex;gap:8px;}
.chat-input{flex:1;background:#12141f;border:1px solid var(--border);
  color:var(--text);padding:10px 14px;border-radius:6px;font-size:0.88rem;font-family:inherit;}
.chat-input:focus{outline:none;border-color:var(--accent);}
.send-btn{background:var(--accent);color:white;border:none;
  padding:10px 20px;border-radius:6px;cursor:pointer;font-size:0.88rem;}
.send-btn:hover{opacity:0.85;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px;}
.stat-box{background:color-mix(in srgb,var(--accent) 8%,transparent);
  border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);
  border-radius:8px;padding:14px;text-align:center;}
.stat-num{font-size:1.8rem;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:0.72rem;color:var(--dim);margin-top:2px;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
{% block extra_style %}{% endblock %}
</head>
<body>

<header>
  <span style="font-size:1.3rem;">&#x1F916;</span>
  <h1>AION-Core</h1>
  <span class="ver">v{{ version }}</span>
  <div class="spacer"></div>
  <span id="ai-status" style="font-size:0.78rem;color:var(--dim);">
    {% if ai_available %}
    <span class="badge badge-green">&#9679; Groq</span>
    {% else %}
    <span class="badge badge-red">&#9679; Groq offline</span>
    {% endif %}
  </span>
  <!-- Bouton mise a jour AION-Core -->
  <div id="aion-update-indicator" style="position:relative;">
    <button id="update-btn" class="hbtn" onclick="checkAionUpdate()"
      title="Verifier les mises a jour AION-Core"
      style="display:flex;align-items:center;gap:6px;position:relative;">
      <span id="update-btn-icon">&#x1F504;</span>
      <span id="update-btn-label" style="font-size:.78rem;">MAJ</span>
      <span id="update-dot" style="display:none;position:absolute;top:-3px;right:-3px;
        width:8px;height:8px;border-radius:50%;background:#f44336;"></span>
    </button>
    <!-- Popup résultat -->
    <div id="update-popup" style="display:none;position:absolute;right:0;top:42px;
      width:320px;background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;
      padding:16px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.5);">
    </div>
  </div>
  <!-- Boutons veille -->
  <button class="hbtn" title="Veille simple (Sleep)" style="font-size:.82rem;"
          onclick="if(confirm('Mettre en veille simple ?')) fetch('/api/system/sleep',{method:'POST'}).then(r=>r.json()).then(d=>alert(d.result||d.response))">
    &#x1F4A4; Veille
  </button>
  <button class="hbtn" title="Veille prolongee (Hibernate)" style="font-size:.82rem;"
          onclick="if(confirm('Veille prolongee (sauvegarde RAM) ?')) fetch('/api/system/hibernate',{method:'POST'}).then(r=>r.json()).then(d=>alert(d.result||d.response))">
    &#x1F4BE; Hibernate
  </button>
  <button class="hbtn" onclick="toggleTheme()">&#x1F313;</button>
  <a href="/docs" target="_blank" class="hbtn">&#x1F4D6; API</a>
</header>

<div class="layout">

  <nav class="sidebar">
    <div class="sb-section">Navigation</div>
    <a href="/" class="nav-item {% if active=='dashboard' %}active{% endif %}">
      <span class="nav-icon">&#x1F4CA;</span>
      <span class="nav-label">Dashboard</span>
    </a>
    <a href="/chat" class="nav-item {% if active=='chat' %}active{% endif %}">
      <span class="nav-icon">&#x1F916;</span>
      <span class="nav-label">IA Chat</span>
    </a>

    <div class="sb-section">Apps</div>
    <div id="sidebar-apps"
         hx-get="/api/nav/apps/sidebar"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div style="padding:8px 14px;color:var(--dim);font-size:0.8rem;">&#8230;</div>
    </div>

    <div class="sb-section">AION</div>
    <a href="/store" class="nav-item {% if active=='store' %}active{% endif %}">
      <span class="nav-icon">&#x1F3EA;</span>
      <span class="nav-label">App Store</span>
    </a>
    <a href="/docker" class="nav-item {% if active=='docker' %}active{% endif %}">
      <span class="nav-icon">&#x1F433;</span>
      <span class="nav-label">Docker</span>
    </a>
    <a href="/memory" class="nav-item {% if active=='memory' %}active{% endif %}">
      <span class="nav-icon">&#x1F9E0;</span>
      <span class="nav-label">Memory</span>
    </a>

    <a href="/settings" class="nav-item {% if active=='settings' %}active{% endif %}">
      <span class="nav-icon">&#x2699;&#xFE0F;</span>
      <span class="nav-label">Settings</span>
    </a>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>

<script>
document.addEventListener("htmx:afterSwap", function(e) {
  if (e.target.id === "sidebar-apps") {
    var currentPath = window.location.pathname;
    document.querySelectorAll("#sidebar-apps .nav-item").forEach(function(item) {
      if (item.getAttribute("href") === currentPath) {
        item.classList.add("active");
      }
    });
  }
});
function toggleTheme() {
  var html = document.documentElement;
  html.setAttribute("data-theme",
    html.getAttribute("data-theme") === "dark" ? "light" : "dark");
  localStorage.setItem("theme", html.getAttribute("data-theme"));
}
var t = localStorage.getItem("theme");
if (t) document.documentElement.setAttribute("data-theme", t);

// ── Updater AION-Core ─────────────────────────────────────────────
function checkAionUpdate() {
  var btn   = document.getElementById("update-btn");
  var icon  = document.getElementById("update-btn-icon");
  var label = document.getElementById("update-btn-label");
  var popup = document.getElementById("update-popup");
  var dot   = document.getElementById("update-dot");

  // Toggle popup si deja ouvert
  if (popup.style.display === "block") {
    popup.style.display = "none";
    return;
  }

  // Animation chargement
  icon.textContent  = "⏳";
  label.textContent = "...";
  btn.disabled      = true;
  popup.style.display = "block";
  popup.innerHTML   = "<div style='color:#888;font-size:.82rem;text-align:center;padding:8px'>⏳ Vérification en cours...</div>";

  fetch("/api/update/check", {method:"POST"})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      btn.disabled      = false;
      icon.innerHTML    = "&#x1F504;";
      label.textContent = "MAJ";

      if (d.error) {
        popup.innerHTML = _updatePopupError(d.error);
        return;
      }
      if (d.update_available) {
        dot.style.display = "block";
        popup.innerHTML   = _updatePopupAvailable(d);
      } else {
        dot.style.display = "none";
        popup.innerHTML   = _updatePopupUpToDate(d);
      }
    })
    .catch(function(e) {
      btn.disabled      = false;
      icon.innerHTML    = "&#x1F504;";
      label.textContent = "MAJ";
      popup.innerHTML   = _updatePopupError(e.toString());
    });
}

function _updatePopupUpToDate(d) {
  var dateStr = d.checked_at
    ? "<div style='font-size:.72rem;color:#555;margin-top:4px;'>Vérifié le " +
      new Date(d.checked_at).toLocaleString() + "</div>"
    : "";
  var sha = d.current_commit || "?";
  return "<div style='text-align:center;padding:8px 0;'>" +
    "<div style='font-size:1.8rem;margin-bottom:6px;'>✅</div>" +
    "<div style='font-weight:600;color:#4caf50;margin-bottom:4px;'>AION-Core est à jour</div>" +
    "<div style='font-size:.78rem;color:#888;'>Commit : <code style='color:#ccc;'>" + sha + "</code></div>" +
    dateStr +
    "<button onclick=\"document.getElementById('update-popup').style.display='none'\"" +
    " style='margin-top:10px;background:transparent;border:1px solid #2a2d3e;" +
    "color:#888;padding:4px 12px;border-radius:5px;cursor:pointer;font-size:.78rem;'>Fermer</button>" +
    "</div>";
}

function _updatePopupAvailable(d) {
  var commits = d.commits_behind || 1;
  var msg     = d.latest_message ? d.latest_message.substring(0, 60) : "";
  var date    = d.latest_date    ? "<div style='font-size:.72rem;color:#888;margin-bottom:8px;'>" + d.latest_date + "</div>" : "";
  var msgHtml = msg ? "<div style='font-size:.8rem;color:#ccc;background:#0f1117;padding:8px 10px;" +
    "border-radius:6px;margin-bottom:8px;border-left:2px solid #1e90ff;'>" + msg + "</div>" : "";
  var sha     = d.remote_commit  ? "<div style='font-size:.75rem;color:#888;'>" + d.remote_commit + "</div>" : "";

  return "<div>" +
    "<div style='display:flex;align-items:center;gap:8px;margin-bottom:10px;'>" +
    "<span style='font-size:1.3rem;'>📦</span>" +
    "<div>" +
    "<div style='font-weight:600;color:#1e90ff;font-size:.9rem;'>Mise à jour disponible" +
    " <span style='font-size:.72rem;color:#888;margin-left:4px;'>" + commits + " commit(s)</span></div>" +
    sha + "</div></div>" +
    msgHtml + date +
    "<div style='display:flex;gap:6px;'>" +
    "<button onclick='applyAionUpdateFromHeader()'" +
    " style='flex:1;background:#1e90ff;color:#fff;border:none;" +
    "padding:8px;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;'>" +
    "⬇️ Mettre à jour + redémarrer</button>" +
    "<button onclick=\"document.getElementById('update-popup').style.display='none'\"" +
    " style='background:transparent;border:1px solid #2a2d3e;color:#888;" +
    "padding:8px 10px;border-radius:6px;cursor:pointer;font-size:.78rem;'>Plus tard</button>" +
    "</div></div>";
}

function _updatePopupError(err) {
  return "<div style='text-align:center;padding:8px 0;'>" +
    "<div style='font-size:1.5rem;margin-bottom:6px;'>⚠️</div>" +
    "<div style='font-size:.8rem;color:#f44336;margin-bottom:8px;'>Erreur de vérification</div>" +
    "<div style='font-size:.75rem;color:#888;'>" + err + "</div>" +
    "<button onclick=\"document.getElementById('update-popup').style.display='none'\"" +
    " style='margin-top:8px;background:transparent;border:1px solid #2a2d3e;" +
    "color:#888;padding:4px 12px;border-radius:5px;cursor:pointer;font-size:.78rem;'>Fermer</button>" +
    "</div>";
}

function applyAionUpdateFromHeader() {
  if (!confirm("Mettre à jour AION-Core et redémarrer ?")) return;
  var popup = document.getElementById("update-popup");
  popup.innerHTML = "<div style='color:#ff9800;font-size:.82rem;text-align:center;padding:8px'>⏳ git pull + pip install en cours...</div>";
  fetch("/api/update/apply", {method:"POST"})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) {
        popup.innerHTML =
          "<div style='text-align:center;padding:8px;'>" +
          "<div style='font-size:1.5rem;'>✅</div>" +
          "<div style='color:#4caf50;font-weight:600;margin:6px 0;'>Mise à jour appliquée !</div>" +
          "<div style='font-size:.78rem;color:#888;'>Redémarrage dans 5 secondes...</div></div>";
        setTimeout(function() {
          popup.innerHTML = "<div style='color:#888;font-size:.82rem;text-align:center;'>⏳ Reconnexion...</div>";
          setTimeout(function() { location.reload(); }, 6000);
        }, 3000);
      } else {
        popup.innerHTML = _updatePopupError(d.message || "Erreur inconnue");
      }
    })
    .catch(function(e) { popup.innerHTML = _updatePopupError(e.toString()); });
}

// Fermer le popup en cliquant ailleurs
document.addEventListener("click", function(e) {
  var indicator = document.getElementById("aion-update-indicator");
  var popup     = document.getElementById("update-popup");
  if (indicator && popup && !indicator.contains(e.target)) {
    popup.style.display = "none";
  }
});

// Verifier le statut au chargement (sans git fetch)
window.addEventListener("DOMContentLoaded", function() {
  fetch("/api/update/status")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var dot = document.getElementById("update-dot");
      if (d && d.update_available && dot) {
        dot.style.display = "block";
      }
    })
    .catch(function() {});
});
</script>
{% block extra_script %}{% endblock %}
</body>
</html>
