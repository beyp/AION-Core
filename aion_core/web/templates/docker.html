<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Docker — AION-Core</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
:root[data-theme="dark"]{--bg:#0f1117;--sb:#13161f;--card:#1a1d27;--border:#2a2d3e;
  --text:#e0e0e0;--dim:#888;--accent:#1e90ff;--green:#4caf50;--red:#f44336;
  --orange:#ff9800;--blue:#2196f3;--hdr:#151821;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{background:var(--hdr);border-bottom:2px solid #2196f3;padding:0 20px;
  height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
header h1{color:#2196f3;font-size:1.2rem;font-weight:700;}
.spacer{flex:1;}
.hbtn{background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.82rem;text-decoration:none;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--sb);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:10px 0;}
.sb-sec{padding:4px 12px;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-top:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-left:3px solid transparent;
  font-size:.88rem;text-decoration:none;color:var(--text);}
.nav-item:hover{background:rgba(30,144,255,.08);}
.nav-item.active{background:rgba(33,150,243,.12);border-left-color:#2196f3;color:#2196f3;font-weight:600;}
.nav-icon{width:20px;text-align:center;} .nav-label{flex:1;}
.main{flex:1;overflow-y:auto;padding:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.btn{border:none;border-radius:6px;cursor:pointer;font-size:.82rem;padding:7px 14px;font-family:inherit;}
.btn:hover{opacity:.85;}
.btn-green{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.4);color:var(--green);font-weight:600;}
.btn-red{background:rgba(244,67,54,.15);border:1px solid rgba(244,67,54,.4);color:var(--red);font-weight:600;}
.btn-blue{background:#2196f3;color:#fff;font-weight:600;}
.btn-orange{background:rgba(255,152,0,.15);border:1px solid rgba(255,152,0,.4);color:var(--orange);}
.btn-gray{background:transparent;border:1px solid var(--border);color:var(--dim);}
.container-row{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:1px solid var(--border);font-size:.88rem;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-up{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot-down{background:var(--red);}
.log-box{background:#0a0c14;border-radius:8px;padding:12px;font-family:"Cascadia Code",Consolas,monospace;
  font-size:.78rem;color:#4caf50;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-top:8px;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<header>
  <span style="font-size:1.3rem;">&#x1F433;</span>
  <h1>Docker Manager</h1>
  <div class="spacer"></div>
  <a href="/" class="hbtn">&#x2190; Dashboard</a>
</header>
<div class="layout">
  <nav class="sidebar">
    <div class="sb-sec">Navigation</div>
    <a href="/" class="nav-item"><span class="nav-icon">&#x1F4CA;</span><span class="nav-label">Dashboard</span></a>
    <a href="/chat" class="nav-item"><span class="nav-icon">&#x1F916;</span><span class="nav-label">IA Chat</span></a>
    <div class="sb-sec">Apps</div>
    <div id="sidebar-apps" hx-get="/api/nav/apps/sidebar" hx-trigger="load" hx-swap="innerHTML">
      <div style="padding:8px 14px;color:var(--dim);font-size:.8rem;">&#8230;</div>
    </div>
    <div class="sb-sec">AION</div>
    <a href="/store" class="nav-item"><span class="nav-icon">&#x1F3EA;</span><span class="nav-label">App Store</span></a>
    <a href="/docker" class="nav-item active"><span class="nav-icon">&#x1F433;</span><span class="nav-label">Docker</span></a>
    <a href="/memory" class="nav-item"><span class="nav-icon">&#x1F9E0;</span><span class="nav-label">Memory</span></a>
    <a href="/settings" class="nav-item"><span class="nav-icon">&#x2699;&#xFE0F;</span><span class="nav-label">Settings</span></a>
  </nav>

  <main class="main">
    <h2 style="color:#2196f3;margin-bottom:4px;">&#x1F433; Docker Manager</h2>
    <p style="color:var(--dim);font-size:.82rem;margin-bottom:16px;">
      Gère tes containers Docker sans quitter AION-Core.
    </p>

    <!-- Statut Docker -->
    <div class="card" id="docker-status-card">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:1.5rem;">&#x1F433;</span>
        <div style="flex:1;">
          <div style="font-weight:600;margin-bottom:2px;">Docker Desktop</div>
          <div id="docker-status-text" style="font-size:.82rem;color:var(--dim);">Vérification...</div>
        </div>
        <button class="btn btn-gray" onclick="refreshAll()" style="font-size:.78rem;">
          &#x1F504; Actualiser
        </button>
      </div>
    </div>

    <!-- Apps Docker (depuis apps.local.json) -->
    <div style="font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;
         color:var(--dim);margin-bottom:10px;">Apps configurées en Docker</div>
    <div id="docker-apps">
      <div style="color:var(--dim);font-size:.85rem;">Chargement...</div>
    </div>

    <!-- Tous les containers -->
    <div style="font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;
         color:var(--dim);margin:20px 0 10px;">Tous les containers</div>
    <div class="card" id="all-containers">
      <div style="color:var(--dim);font-size:.85rem;">Chargement...</div>
    </div>

    <!-- Logs -->
    <div id="logs-section" style="display:none;">
      <div style="font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;
           color:var(--dim);margin:16px 0 8px;">
        Logs : <span id="logs-app-name"></span>
        <button class="btn btn-gray" onclick="document.getElementById('logs-section').style.display='none'"
                style="font-size:.72rem;padding:3px 8px;margin-left:8px;">&#x2715;</button>
      </div>
      <div id="logs-box" class="log-box"></div>
    </div>
  </main>
</div>

<script>
'use strict';

// Sidebar htmx
document.addEventListener('htmx:afterSwap', function(e) {
  if (e.target.id === 'sidebar-apps') {
    e.target.querySelectorAll('.nav-item').forEach(function(a) {
      if (a.getAttribute('href') === window.location.pathname) a.classList.add('active');
    });
  }
});

function showMsg(el, color, html) {
  var colors = {green:'var(--green)', red:'var(--red)', orange:'var(--orange)', blue:'#2196f3'};
  el.style.color  = colors[color] || color;
  el.innerHTML    = html;
}

// ── Docker Status ─────────────────────────────────────────────────
function checkDockerStatus() {
  fetch('/api/docker/status')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var el  = document.getElementById('docker-status-text');
    var card = document.getElementById('docker-status-card');
    if (d.available) {
      el.innerHTML = '<span style="color:var(--green);">&#x25CF; En cours</span>'
                   + (d.server_version ? ' — Docker v' + d.server_version : '');
      card.style.borderColor = 'rgba(76,175,80,.4)';
    } else {
      el.innerHTML = '<span style="color:var(--red);">&#x25CF; Non disponible</span>'
                   + ' — <a href="https://docs.docker.com/desktop/windows/" target="_blank"'
                   + ' style="color:var(--accent);">Installer Docker Desktop</a>';
      card.style.borderColor = 'rgba(244,67,54,.4)';
    }
  })
  .catch(function() {
    document.getElementById('docker-status-text').innerHTML =
      '<span style="color:var(--red);">Erreur de connexion</span>';
  });
}

// ── Apps Docker ───────────────────────────────────────────────────
function loadDockerApps() {
  // Charger les apps configurées en mode docker depuis apps.local.json
  fetch('/api/store/status')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var apps = (d.apps || []).filter(function(a) {
      // Trouver les apps docker (on va vérifier via /api/nav/apps)
      return true; // On affiche tout, on filtre côté serveur
    });
    // Charger les apps docker via l'API nav
    return fetch('/api/nav/apps');
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var dockerApps = (d.apps || []);
    renderDockerApps(dockerApps);
  })
  .catch(function(e) {
    document.getElementById('docker-apps').innerHTML =
      '<p style="color:var(--dim);font-size:.85rem;">Aucune app Docker configurée.</p>';
  });
}

function renderDockerApps(apps) {
  var el = document.getElementById('docker-apps');
  if (!apps.length) {
    el.innerHTML = '<p style="color:var(--dim);font-size:.85rem;padding:10px;">Aucune app configurée.</p>';
    return;
  }
  var html = '';
  apps.forEach(function(app) {
    html += '<div class="card" id="docker-app-' + app.id + '">'
          + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">'
          + '<span style="font-size:1.2rem;">&#x1F433;</span>'
          + '<div style="flex:1;"><div style="font-weight:600;">' + app.name + '</div>'
          + '<div style="font-size:.78rem;color:var(--dim);">' + (app.external_url || '') + '</div></div>'
          + '<span id="running-badge-' + app.id + '" style="font-size:.78rem;color:var(--dim);">&#x23F3;</span>'
          + '</div>'
          + '<div style="display:flex;gap:8px;flex-wrap:wrap;">'
          + '<button class="btn btn-green" onclick="dockerAction('start','' + app.id + '')">&#x25B6; Start</button>'
          + '<button class="btn btn-red" onclick="dockerAction('stop','' + app.id + '')">&#x25A0; Stop</button>'
          + '<button class="btn btn-blue" onclick="dockerAction('build','' + app.id + '')" style="background:rgba(33,150,243,.2);border:1px solid #2196f355;color:#2196f3;">&#x1F528; Build</button>'
          + '<button class="btn btn-orange" onclick="showLogs('' + app.id + '')">&#x1F4CB; Logs</button>'
          + '<a href="' + (app.external_url || '#') + '" target="_blank" class="btn btn-gray">&#x1F680; Ouvrir</a>'
          + '</div>'
          + '<div id="sr-docker-' + app.id + '" style="margin-top:8px;font-size:.82rem;display:none;"></div>'
          + '</div>';
    // Vérifier si running
    checkContainerRunning(app.id);
  });
  el.innerHTML = html;
}

function checkContainerRunning(appId) {
  fetch('/api/docker/running/' + appId)
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var badge = document.getElementById('running-badge-' + appId);
    if (badge) {
      badge.innerHTML = d.running
        ? '<span style="color:var(--green);">&#x25CF; Running</span>'
        : '<span style="color:var(--red);">&#x25CF; Stopped</span>';
    }
  }).catch(function(){});
}

// ── Docker Actions ────────────────────────────────────────────────
function dockerAction(action, appId) {
  var res = document.getElementById('sr-docker-' + appId);
  if (res) { res.style.display='block'; res.style.color='var(--orange)'; res.textContent='&#x23F3; En cours...'; }

  var URLS = {
    start: '/api/docker/start/' + appId,
    stop:  '/api/docker/stop/'  + appId,
    build: '/api/docker/start/' + appId  // start avec build=true
  };
  var body = action === 'build' ? JSON.stringify({build: true}) : null;
  var method = 'POST';

  fetch(URLS[action], {
    method: method,
    headers: body ? {'Content-Type': 'application/json'} : {},
    body: body
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (res) {
      res.style.color = d.success ? 'var(--green)' : 'var(--red)';
      res.textContent = d.message;
    }
    setTimeout(function() { checkContainerRunning(appId); }, 2000);
  })
  .catch(function(e) {
    if (res) { res.style.color='var(--red)'; res.textContent='Erreur: ' + e; }
  });
}

// ── Tous les containers ───────────────────────────────────────────
function loadAllContainers() {
  fetch('/api/docker/containers')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var el = document.getElementById('all-containers');
    var containers = d.containers || [];
    if (!containers.length) {
      el.innerHTML = '<p style="color:var(--dim);font-size:.85rem;">Aucun container Docker.</p>';
      return;
    }
    var html = '';
    containers.forEach(function(c) {
      html += '<div class="container-row">'
            + '<span class="status-dot ' + (c.running ? 'dot-up' : 'dot-down') + '"></span>'
            + '<span style="flex:1;font-weight:500;">' + c.name + '</span>'
            + '<span style="color:var(--dim);font-size:.78rem;width:150px;">' + c.status + '</span>'
            + '<span style="color:var(--dim);font-size:.72rem;width:180px;overflow:hidden;text-overflow:ellipsis;">' + (c.ports||'') + '</span>'
            + '<button class="btn btn-gray" onclick="showLogs('' + c.name + '')" style="font-size:.72rem;padding:3px 8px;">Logs</button>'
            + (c.running
               ? '<button class="btn btn-red" onclick="dockerAction('stop','' + c.name + '')" style="font-size:.72rem;padding:3px 8px;">Stop</button>'
               : '<button class="btn btn-green" onclick="dockerAction('start','' + c.name + '')" style="font-size:.72rem;padding:3px 8px;">Start</button>')
            + '</div>';
    });
    el.innerHTML = html;
  })
  .catch(function(e) {
    document.getElementById('all-containers').innerHTML =
      '<p style="color:var(--dim);">Docker non disponible ou erreur: ' + e + '</p>';
  });
}

// ── Logs ──────────────────────────────────────────────────────────
function showLogs(appId) {
  document.getElementById('logs-section').style.display = 'block';
  document.getElementById('logs-app-name').textContent  = appId;
  var box = document.getElementById('logs-box');
  box.textContent = 'Chargement des logs...';
  fetch('/api/docker/logs/' + appId + '?lines=100')
  .then(function(r) { return r.json(); })
  .then(function(d) { box.textContent = d.logs || 'Aucun log.'; box.scrollTop = 99999; })
  .catch(function(e) { box.textContent = 'Erreur: ' + e; });
}

// ── Refresh ───────────────────────────────────────────────────────
function refreshAll() {
  checkDockerStatus();
  loadDockerApps();
  loadAllContainers();
}

// Init
refreshAll();
</script>
</body>
</html>
