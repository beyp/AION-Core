<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Docker — AION-Core</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
:root[data-theme="dark"]{--bg:#0f1117;--sb:#13161f;--card:#1a1d27;--border:#2a2d3e;
  --text:#e0e0e0;--dim:#888;--accent:#1e90ff;--green:#4caf50;--red:#f44336;
  --orange:#ff9800;--docker:#2196f3;--hdr:#151821;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{background:var(--hdr);border-bottom:2px solid var(--docker);padding:0 20px;
  height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
header h1{color:var(--docker);font-size:1.2rem;font-weight:700;}
.spacer{flex:1;}
.hbtn{background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.82rem;text-decoration:none;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--sb);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:10px 0;}
.sb-sec{padding:4px 12px;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-top:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-left:3px solid transparent;
  font-size:.88rem;text-decoration:none;color:var(--text);}
.nav-item:hover{background:rgba(33,150,243,.08);}
.nav-item.active{background:rgba(33,150,243,.12);border-left-color:var(--docker);color:var(--docker);font-weight:600;}
.nav-icon{width:20px;text-align:center;} .nav-label{flex:1;}
.main{flex:1;overflow-y:auto;padding:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.btn{border:none;border-radius:6px;cursor:pointer;font-size:.82rem;padding:6px 12px;font-family:inherit;}
.btn:hover{opacity:.85;}
.btn-green{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.4);color:var(--green);font-weight:600;}
.btn-red{background:rgba(244,67,54,.15);border:1px solid rgba(244,67,54,.4);color:var(--red);font-weight:600;}
.btn-docker{background:rgba(33,150,243,.2);border:1px solid rgba(33,150,243,.4);color:var(--docker);font-weight:600;}
.btn-orange{background:rgba(255,152,0,.15);border:1px solid rgba(255,152,0,.4);color:var(--orange);}
.btn-gray{background:transparent;border:1px solid var(--border);color:var(--dim);}
.container-row{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--border);font-size:.85rem;}
.container-row:last-child{border-bottom:none;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-up{background:var(--green);box-shadow:0 0 5px var(--green);}
.dot-down{background:#555;}
.log-box{background:#0a0c14;border-radius:8px;padding:12px;
  font-family:"Cascadia Code",Consolas,monospace;font-size:.75rem;color:#4caf50;
  white-space:pre-wrap;max-height:280px;overflow-y:auto;margin-top:8px;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<header>
  <span style="font-size:1.3rem;">&#x1F433;</span>
  <h1>Docker Manager</h1>
  <div class="spacer"></div>
  <button class="hbtn" onclick="refreshAll()">&#x1F504; Actualiser</button>
  <a href="/" class="hbtn" style="margin-left:6px;">&#x2190; Dashboard</a>
</header>
<div class="layout">
  <nav class="sidebar">
    <div class="sb-sec">Navigation</div>
    <a href="/" class="nav-item"><span class="nav-icon">&#x1F4CA;</span><span class="nav-label">Dashboard</span></a>
    <a href="/chat" class="nav-item"><span class="nav-icon">&#x1F916;</span><span class="nav-label">IA Chat</span></a>
    <div class="sb-sec">Apps</div>
    <div id="sidebar-apps" hx-get="/api/nav/apps/sidebar" hx-trigger="load" hx-swap="innerHTML">
      <div style="padding:8px 14px;color:var(--dim);font-size:.8rem;">&#8230;</div>
    </div>
    <div class="sb-sec">AION</div>
    <a href="/store" class="nav-item"><span class="nav-icon">&#x1F3EA;</span><span class="nav-label">App Store</span></a>
    <a href="/docker" class="nav-item active"><span class="nav-icon">&#x1F433;</span><span class="nav-label">Docker</span></a>
    <a href="/memory" class="nav-item"><span class="nav-icon">&#x1F9E0;</span><span class="nav-label">Memory</span></a>
    <a href="/settings" class="nav-item"><span class="nav-icon">&#x2699;&#xFE0F;</span><span class="nav-label">Settings</span></a>
  </nav>

  <main class="main">
    <h2 style="color:var(--docker);margin-bottom:4px;">&#x1F433; Docker Manager</h2>
    <p style="color:var(--dim);font-size:.82rem;margin-bottom:16px;">
      Gère tes containers Docker sans quitter AION-Core.
    </p>

    <!-- Statut Docker Desktop -->
    <div class="card" id="docker-status-card">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:1.4rem;">&#x1F433;</span>
        <div style="flex:1;">
          <div style="font-weight:600;">Docker Desktop</div>
          <div id="docker-status-txt" style="font-size:.82rem;color:var(--dim);">
            &#x23F3; Vérification...
          </div>
        </div>
      </div>
    </div>

    <!-- Containers en cours -->
    <div style="font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;
         color:var(--dim);margin:16px 0 8px;">Containers</div>
    <div class="card" id="containers-list">
      <div style="color:var(--dim);font-size:.85rem;">&#x23F3; Chargement...</div>
    </div>

    <!-- Logs -->
    <div id="logs-section" style="display:none;margin-top:12px;">
      <div style="font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;
           color:var(--dim);margin-bottom:6px;display:flex;align-items:center;gap:8px;">
        Logs : <span id="logs-title" style="color:var(--text);text-transform:none;font-weight:400;"></span>
        <button class="btn btn-gray" onclick="closeLogs()" style="font-size:.72rem;padding:2px 8px;margin-left:auto;">&#x2715; Fermer</button>
      </div>
      <div id="logs-box" class="log-box"></div>
    </div>
  </main>
</div>

<script>
'use strict';

// Sidebar
document.addEventListener('htmx:afterSwap', function(e) {
  if (e.target.id === 'sidebar-apps') {
    e.target.querySelectorAll('.nav-item').forEach(function(a) {
      if (a.getAttribute('href') === window.location.pathname) a.classList.add('active');
    });
  }
});

// ── Docker Status ─────────────────────────────────────────────────
function checkDockerStatus() {
  var el   = document.getElementById('docker-status-txt');
  var card = document.getElementById('docker-status-card');
  el.innerHTML = '&#x23F3; Vérification...';

  fetch('/api/docker/status')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.available) {
      el.innerHTML = '<span style="color:var(--green);">&#x25CF; En cours</span>'
                   + (d.server_version ? ' &mdash; Docker v' + d.server_version : '');
      card.style.borderColor = 'rgba(76,175,80,.4)';
    } else {
      el.innerHTML = '<span style="color:var(--red);">&#x25CF; Non disponible</span>'
                   + ' &mdash; Lance Docker Desktop';
      card.style.borderColor = 'rgba(244,67,54,.4)';
    }
  })
  .catch(function() {
    el.innerHTML = '<span style="color:var(--red);">&#x25CF; Erreur</span>';
  });
}

// ── Containers ────────────────────────────────────────────────────
function loadContainers() {
  var el = document.getElementById('containers-list');
  el.innerHTML = '<div style="color:var(--dim);font-size:.85rem;">&#x23F3; Chargement...</div>';

  fetch('/api/docker/containers')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var list = d.containers || [];
    if (!list.length) {
      el.innerHTML = '<div style="color:var(--dim);font-size:.85rem;padding:8px;">Aucun container Docker. Lance une app via docker compose.</div>';
      return;
    }
    var html = '';
    list.forEach(function(c) {
      var running = c.running;
      var dotCls  = running ? 'dot-up' : 'dot-down';
      var ports   = c.ports ? '<span style="color:var(--dim);font-size:.75rem;">' + c.ports.replace(/0\.0\.0\.0:/g,'') + '</span>' : '';
      html += '<div class="container-row">'
            + '<span class="dot ' + dotCls + '"></span>'
            + '<span style="flex:1;font-weight:500;">' + c.name + '</span>'
            + ports
            + '<span style="color:var(--dim);font-size:.75rem;width:120px;text-align:right;">' + c.status + '</span>'
            + '<div style="display:flex;gap:5px;margin-left:8px;">';
      if (running) {
        html += '<button class="btn btn-red" data-docker-action="stop" data-cname="' + c.name + '" style="font-size:.75rem;padding:4px 8px;">&#x25A0; Stop</button>';
      } else {
        html += '<button class="btn btn-green" data-docker-action="start" data-cname="' + c.name + '" style="font-size:.75rem;padding:4px 8px;">&#x25B6; Start</button>';
      }
      html += '<button class="btn btn-orange" data-docker-logs="' + c.name + '" style="font-size:.75rem;padding:4px 8px;">&#x1F4CB; Logs</button>';
      if (c.ports) {
        var portNum = c.ports.match(/(\d{4,5})->/);
        if (portNum) {
          html += '<a href="http://localhost:' + portNum[1] + '" target="_blank" class="btn btn-gray" style="font-size:.75rem;padding:4px 8px;">&#x1F680;</a>';
        }
      }
      html += '</div></div>';
    });
    el.innerHTML = html;
  })
  .catch(function(e) {
    el.innerHTML = '<div style="color:var(--red);font-size:.85rem;">Erreur: ' + e + '</div>';
  });
}

// Event delegation pour les boutons containers
document.addEventListener('click', function(e) {
  // Action docker (start/stop)
  var btn = e.target.closest('[data-docker-action]');
  if (btn) {
    var action = btn.getAttribute('data-docker-action');
    var cname  = btn.getAttribute('data-cname');
    btn.disabled = true;
    btn.textContent = '...';
    fetch('/api/docker/' + action + '/' + cname, {method: 'POST'})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      setTimeout(function() { loadContainers(); }, 1500);
    })
    .catch(function() { setTimeout(function() { loadContainers(); }, 1000); });
    return;
  }
  // Logs
  var logBtn = e.target.closest('[data-docker-logs]');
  if (logBtn) {
    showLogs(logBtn.getAttribute('data-docker-logs'));
    return;
  }
});

// ── Logs ──────────────────────────────────────────────────────────
function showLogs(cname) {
  document.getElementById('logs-section').style.display = 'block';
  document.getElementById('logs-title').textContent = cname;
  var box = document.getElementById('logs-box');
  box.textContent = 'Chargement...';
  fetch('/api/docker/logs/' + cname + '?lines=100')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    box.textContent = d.logs || '(aucun log)';
    box.scrollTop   = box.scrollHeight;
  })
  .catch(function(e) { box.textContent = 'Erreur: ' + e; });
}

function closeLogs() {
  document.getElementById('logs-section').style.display = 'none';
}

// ── Refresh ───────────────────────────────────────────────────────
function refreshAll() {
  checkDockerStatus();
  loadContainers();
}

refreshAll();
</script>
</body>
</html>
